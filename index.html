<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>El Plumero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/jquery.ui.css">
<link rel="stylesheet" type="text/css" href="css/elplumero.css">
<script type="text/javascript" src="extras/jquery.min.1.7.js"></script>
<script type="text/javascript" src="extras/modernizr.2.5.3.min.js"></script>
<script type="text/javascript" src="lib/turn.min.js"></script>
<script type="text/javascript" src="js/elplumero.js"></script>
</head>
<body>

<div id="sidebar-title">
	<h1 class="titulo-principal">EL PLUMERO</h1>
	<h2 class="subtitulo">El Plumero</h2>
	<h3 class="logo-script">El Plumero</h3>
</div>

<div id="sidebar-right">
	<span class="titulo-principal">Battiato</span>
	<span class="titulo-principal">Pisani</span>
	<span class="titulo-principal">Verdy</span>
	<span class="titulo-principal">Virgili</span>
</div>

<div id="canvas">
	<div id="book-zoom">
		<div class="sj-book">

			<!-- p1 : Portada -->
			<div depth="5" class="hard cover-front">
				<img src="pics/portada.jpg" style="display:block;width:100%;height:100%;">
			</div>

			<!-- p2 : Tapa interior — mitad izquierda de la foto 25
			     Oculta (opacity:0) cuando la portada está sola (vista 1). -->
			<div depth="5" class="hard front-side" id="inner-front">
				<div style="margin:50px 0 50px 50px;width:670px;height:860px;
				            overflow:hidden;display:flex;align-items:center;
				            background:white;
				            box-shadow:inset -8px 0 14px -8px rgba(0,0,0,0.20);">
					<img src="pics/25.jpg" style="display:block;width:1340px;flex-shrink:0;">
				</div>
			</div>

			<!-- p43 : Contratapa interior -->
			<div class="hard fixed back-side back-inner" id="inner-back"></div>

			<!-- p44 : Contratapa -->
			<div class="hard back-cover"></div>

		</div>
	</div>
</div>

<script type="text/javascript">

function loadApp() {

	var flipbook = $('.sj-book');

	if (!flipbook.width() || !flipbook.height()) {
		setTimeout(loadApp, 10);
		return;
	}

	buildInnerPages();

	$(document).keydown(function(e) {
		if (e.keyCode === 37) flipbook.turn('previous');
		if (e.keyCode === 39) flipbook.turn('next');
	});

	flipbook.turn({
		elevation   : 50,
		acceleration: false,
		autoCenter  : true,
		gradients   : true,
		duration    : 800,
		pages       : 44,
		when        : {

			turning: function(e, page, view) {
				var book  = $(this);
				var total = book.turn('pages');
				var cur   = book.turn('page');

				// Saltar vista en blanco (p42-p43) al navegar
				if (page === 42 || page === 43) {
					e.preventDefault();
					var target = (cur <= 41) ? total : 41;
					setTimeout(function() { book.turn('page', target); }, 1);
					return;
				}

				if (page >= 2) $('.sj-book .front-side').addClass('fixed');
				else            $('.sj-book .front-side').removeClass('fixed');

				if (page < total) $('.sj-book .back-inner').addClass('fixed');
				else               $('.sj-book .back-inner').removeClass('fixed');
			},

			turned: function(e, page) {
				var book = $(this);
				if (page === 2 || page === 3) book.turn('peel', 'br');
				book.turn('center');
			}

		}
	});

	flipbook.addClass('animated');
	$('#canvas').css({ visibility: '' });
}

$('#canvas').css({ visibility: 'hidden' });
loadApp();

</script>
</body>
</html>
